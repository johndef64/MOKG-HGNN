data:
  batch_size: 16
  hetero_dir: data/prior_knowledge/hetero
  num_workers: 0
  scaler: standard
  split_dir: data/training/splits/splits_seed_42
  template_path: data/prior_knowledge/hetero/hetero_graph_template.pt
  use_cnv: true
  use_mirna: true
early_stopping:
  patience: 2
model:
  backbone: hgt
  dropout: 0.2
  heads: 2
  hidden: 64
  num_layers: 2
  readout_types:
  - gene
  - pathway
  - GO_term
paths:
  results_dir: results
project:
  experiment_name: kg_hgnn_hgt
  seed: 42
runtime:
  device: null
sampler_gamma: 0.98
sampler_strategy: none
scheduler:
  name: reduce_on_plateau
train:
  class_weighted_loss: true
  learning_rate: 0.001
  num_epochs: 2
  weight_decay: 0.0005
