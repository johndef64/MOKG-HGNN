# Config for the heterogeneous multi-scale model (multiomics_kg_hgnn).
# Same schema family as MOGNN-TF's config.yml, plus keys for the hetero backbone.
#
# TUNED (Optuna, hgt study, trial 14): val macro-F1 0.6995 (12 trials finished).
# Best pattern: wide & shallow (hidden 256 / 1 layer), minimal regularisation
# (dropout 0, low weight_decay), higher LR (3e-3), + disease readout scale.
# The un-tuned baseline lives in config_kg_hgnn_base.yml (hidden 64 / 2 layers).

project:
  experiment_name: kg_hgnn_hgt
  seed: 42

paths:
  results_dir: results

data:
  # shared topology template built by scripts/preprocessing/priors/build_hetero_graph.py
  template_path: data/prior_knowledge/hetero/hetero_graph_template.pt
  hetero_dir: data/prior_knowledge/hetero
  split_dir: data/training/splits/splits_seed_42
  use_cnv: true          # ablation: false -> drop CNV channel
  use_mirna: true        # ablation: false -> drop miRNA features
  scaler: standard       # standard | minmax | robust | none (fit on train only)
  batch_size: 16
  num_workers: 0

model:
  backbone: hgt          # hgt (implemented) | hetero_sage, rgcn (TODO)
  hidden: 256               # tuned (was 64); heads must divide hidden -> 256/8 ok
  num_layers: 1             # tuned (was 2): one hop mixes gene->pathway->GO->disease
  heads: 8                  # tuned (was 2): 256/8=32, valid HGT head split
  dropout: 0.0              # tuned (was 0.2): best trial ran without dropout
  readout_types: [gene, pathway, GO_term, disease]  # tuned: + disease scale

train:
  num_epochs: 300           # higher ceiling; early stopping decides when to stop
  learning_rate: 0.003      # tuned (was 0.001)
  weight_decay: 0.0001      # tuned (was 0.0005): lighter L2
  class_weighted_loss: true   # weighted cross-entropy for the 27-class imbalance

early_stopping:
  # loosened: the first run was still improving (val macro-F1 rising) when it
  # stopped at epoch 55 with patience 20. A larger patience lets the model
  # converge before stopping.
  patience: 50

# LR scheduler (reuses MOGNN-TF's OmicScheduler). Options: constant | step |
# exponential | cosine | warmup_cosine | reduce_on_plateau | none.
# reduce_on_plateau is well-suited here: the LR is only cut when val loss stops
# improving, which directly addresses the late-epoch instability (val collapse
# with constant LR) seen in the first long run. cosine is what MOGNN-TF's final
# config used, but its T_max=num_epochs (300) makes it decay too slowly here.
scheduler:
  name: reduce_on_plateau

# imbalance handling on the sampler (alternative/complement to class_weighted_loss)
sampler_strategy: none        # none | weighted
sampler_gamma: 0.98

runtime:
  device: null                # null -> cuda if available, else cpu
