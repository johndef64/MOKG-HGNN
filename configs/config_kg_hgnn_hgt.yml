# Config for the heterogeneous multi-scale model (multiomics_kg_hgnn) — HGT backbone.
# TUNED (Optuna study kg_hgnn_optuna_hgt, trial 14): val macro-F1 0.6995.
# Best pattern: wide & shallow (hidden 256 / 1 layer), no regularisation
# (dropout 0, low weight_decay), higher LR (3e-3).
#
# NOTE (readout): readout_types is deliberately kept FULL and decided by ablation,
# NOT by the tuner — the multi-scale readout is delicate and we want every scale
# to stay informative. For reference, the tuner's best readout for HGT was:
#   gene+pathway+GO_term+disease   (i.e. the full set — nothing dropped here).

project:
  experiment_name: kg_hgnn_hgt
  seed: 42

paths:
  results_dir: results

data:
  template_path: data/prior_knowledge/hetero/hetero_graph_template.pt
  hetero_dir: data/prior_knowledge/hetero
  split_dir: data/training/splits/splits_seed_42
  use_cnv: true          # ablation: false -> drop CNV channel
  use_mirna: true        # ablation: false -> drop miRNA features
  scaler: standard       # standard | minmax | robust | none (fit on train only)
  batch_size: 16         # tuned
  num_workers: 0

model:
  backbone: hgt
  hidden: 256              # tuned (base 64); heads must divide hidden -> 256/8 ok
  num_layers: 1            # tuned (base 2): one hop mixes gene->pathway->GO->disease
  heads: 8                 # tuned (base 2): 256/8=32, valid HGT head split
  dropout: 0.0             # tuned (base 0.2): best trial ran without dropout
  # readout: FULL set, chosen by ablation (not the tuner). Tuner's best for HGT:
  #   [gene, pathway, GO_term, disease]  (= the full set below)
  readout_types: [gene, pathway, GO_term, disease]

train:
  num_epochs: 300           # high ceiling; early stopping decides when to stop
  learning_rate: 0.003      # tuned (base 0.001)
  weight_decay: 0.0001      # tuned (base 0.0005): lighter L2
  class_weighted_loss: true   # tuned true; weighted CE for the 27-class imbalance

early_stopping:
  patience: 50

scheduler:
  name: reduce_on_plateau   # tuned

sampler_strategy: none        # tuned
sampler_gamma: 0.98

runtime:
  device: null                # null -> cuda if available, else cpu
