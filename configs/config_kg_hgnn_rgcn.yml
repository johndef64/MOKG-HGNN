# Config for the heterogeneous multi-scale model (multiomics_kg_hgnn) — RGCN backbone.
# TUNED (Optuna study kg_hgnn_optuna_rgcn, trial 5): val macro-F1 0.7285.
# Best pattern: SMALL & shallow (hidden 64 / 2 layers), no regularisation at all
# (dropout 0, weight_decay 0), high LR (5e-3).
#
# NOTE (readout): readout_types is deliberately kept FULL and decided by ablation,
# NOT by the tuner — the multi-scale readout is delicate and we want every scale
# to stay informative. The tuner's best readout for RGCN was ONLY:
#   gene+pathway   (it dropped GO_term AND disease).
# ^ This is suspicious: it throws away exactly the higher scales that are the whole
#   point of the multi-scale KG. Likely a small-sample tuning artefact, not a real
#   signal. We keep the FULL readout below and let the ablation adjudicate it.

project:
  experiment_name: kg_hgnn_rgcn
  seed: 42

paths:
  results_dir: results

data:
  template_path: data/prior_knowledge/hetero/hetero_graph_template.pt
  hetero_dir: data/prior_knowledge/hetero
  split_dir: data/training/splits/splits_seed_42
  use_cnv: true          # ablation: false -> drop CNV channel
  use_mirna: true        # ablation: false -> drop miRNA features
  scaler: standard       # standard | minmax | robust | none (fit on train only)
  batch_size: 16         # tuned
  num_workers: 0

model:
  backbone: rgcn
  hidden: 64              # tuned (= base): RGCN preferred a SMALL width
  num_layers: 2           # tuned (= base)
  heads: 2                # unused by rgcn (kept for schema uniformity)
  dropout: 0.0            # tuned (base 0.2): best trial ran without dropout
  # readout: FULL set, chosen by ablation (not the tuner). Tuner's best for RGCN
  # was only [gene, pathway] (dropped GO_term + disease) — see the NOTE above;
  # we distrust that and keep the full set below.
  readout_types: [gene, pathway, GO_term, disease]

train:
  num_epochs: 300           # high ceiling; early stopping decides when to stop
  learning_rate: 0.005      # tuned (base 0.001)
  weight_decay: 0.0         # tuned (base 0.0005): no L2
  class_weighted_loss: true   # tuned true; weighted CE for the 27-class imbalance

early_stopping:
  patience: 50

scheduler:
  name: reduce_on_plateau   # tuned

sampler_strategy: none        # tuned
sampler_gamma: 0.98

runtime:
  device: null                # null -> cuda if available, else cpu
