# Thesis Table: model comparison (MOGNN-TF vs Li24 vs MoGCN).
# 5 models × 11 seeds = 55 runs.
# MOGNN-TF is run from this repo. Li24 and MoGCN must be run from
# benchmark/ on the SAME seeds (see benchmark/README.md).
#
# Generate the 55 entries below by enumerating SEEDS × MODELS.
# For a quick smoke test use configs/sweep_baseline_smoke.yml instead.

# The base config is configs/config_final.yml -> pass it via:
#   make ablation-baseline   (full, 22 runs MOGNN-TF; baselines run separately)

experiments:
