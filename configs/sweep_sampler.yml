# Thesis ablation: sampling strategy (Table tab:sampler_combined).
# 8 strategies × 7 seeds = 56 runs, GCN backbone @ 700 genes (set by
# config_final.yml).
#
# Run names follow the convention used by collect_results.py:
#     T3_<strategy>_seed<NNNN>_<YYYYMMDD>_<HHMMSS>
# which yields group_from_name = T3_<strategy> and seed_from_name = <NNNN>.
# This is what analize_metrics.py expects to run Friedman + Wilcoxon-Holm.
#
# Strategies (from the thesis):
#   T3_random            sampler_strategy = random
#   T3_alpha_1           sampler_mode = alpha, sampler_alpha = 1
#   T3_alpha_2           sampler_mode = alpha, sampler_alpha = 2
#   T3_alpha_3           sampler_mode = alpha, sampler_alpha = 3
#   T3_gamma_090         sampler_mode = nulite, sampler_gamma = 0.90
#   T3_gamma_095         sampler_mode = nulite, sampler_gamma = 0.95
#   T3_gamma_098         sampler_mode = nulite, sampler_gamma = 0.98
#   T3_gamma_099         sampler_mode = nulite, sampler_gamma = 0.99
# Seeds: 2020 .. 2026 (7 seeds, as in the thesis).

experiments:
# ---------------- T3_random (7 seeds) ----------------
- name: T3_random_seed2020
  overrides: { project: { seed: 2020 }, sampler_strategy: random }
- name: T3_random_seed2021
  overrides: { project: { seed: 2021 }, sampler_strategy: random }
- name: T3_random_seed2022
