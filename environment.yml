name: mognn-tf
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scikit-learn
  - scipy
  - matplotlib
  - seaborn
  - networkx
  - pyarrow
  - ijson
  - pip:
      # torch / torch_geometric and the PyG C++ extensions are CUDA 12.8
      # builds for torch 2.7.0. They are NOT on PyPI — install them from the
      # PyG wheel index first (see README), then `pip install -e .` resolves
      # the rest. Listing them here documents the pinned versions.
      - --find-links https://data.pyg.org/whl/torch-2.7.0+cu128.html
      - torch==2.7.0
      - torch_geometric==2.7.0
      - torcheval
      - termcolor
      - optuna
      - wandb
      - python-dotenv
      - gdown
      - mygene
      - requests
      - pyyaml
      - openpyxl
      - -e .
